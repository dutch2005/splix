name: Build Splix Drivers V3 (Clean Detection)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.deb_arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            deb_arch: arm64
          - platform: linux/amd64
            deb_arch: amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM emulation
        if: matrix.deb_arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Setup Compiler Cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.deb_arch }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.deb_arch }}-

      - name: Compile and Build via Debian Old-Stable
        run: |
          mkdir -p "${PWD}/artifacts"
          mkdir -p "${PWD}/.ccache"
          
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${PWD}:/workspace" \
            -v "${PWD}/.ccache:/root/.ccache" \
            -w /workspace \
            -e CCACHE_DIR=/root/.ccache \
            debian:oldstable bash -c "
            
            # Install dependencies natively
            apt-get update -y && \
            apt-get install -y build-essential cups libcups2 libcupsimage2 libcups2-dev libcupsimage2-dev libjbig-dev cups-ppdc recode checkinstall pkg-config ccache && \
            
            export PATH=\"/usr/lib/ccache:\$PATH\" && \
            
            # Keep Linker fixes for the 'DSO missing' errors
            export LDFLAGS=\"-lcups -lcupsimage\" && \
            export rastertoqpdl_LIBS=\"-lcups -lcupsimage -lpthread -ljbig\" && \
            export pstoqpdl_LIBS=\"-lcups -lcupsimage -lpthread\" && \
            
            find . -type f -name '*.mk' -exec sed -i 's/-ljbig85/-ljbig/g' {} + && \
            
            make clean && \
            make && \
            make drv && \
            make ppd && \
            
            # Let the Makefile detect CUPS paths naturally, just redirect the final output to DESTDIR
            mkdir -p /tmp/splix-install
            checkinstall -D --install=no --default \
              --pkgname='splix' \
              --pkgversion='2.0.2' \
              --maintainer='github-actions' \
              --pkgarch='${{ matrix.deb_arch }}' \
              --requires='cups, libcups2, libcupsimage2, libjbig0' \
              make DESTDIR=/tmp/splix-install install && \
              
            cp *.deb /workspace/artifacts/
          "

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splix-deb-${{ matrix.deb_arch }}
          path: artifacts/*.deb