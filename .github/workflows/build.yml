name: Build Splix Drivers

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.deb_arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # ARM64 (Raspberry Pi) build configuration
          - platform: linux/arm64
            deb_arch: arm64
            pkg_config_arch: aarch64-linux-gnu
          # x64 (Standard PC/Server) build configuration
          - platform: linux/amd64
            deb_arch: amd64
            pkg_config_arch: x86_64-linux-gnu

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM emulation
        if: matrix.deb_arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      # Setup persistent caching to speed up subsequent builds
      - name: Setup Compiler Cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.deb_arch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.deb_arch }}-

      # Build inside a Debian 'oldstable' container for maximum compatibility
      - name: Compile and Build via Debian Old-Stable
        run: |
          mkdir -p "${PWD}/artifacts"
          mkdir -p "${PWD}/.ccache"
          
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${PWD}:/workspace" \
            -v "${PWD}/.ccache:/root/.ccache" \
            -w /workspace \
            -e CCACHE_DIR=/root/.ccache \
            debian:oldstable bash -c "
            
            apt-get update -y && \
            apt-get install -y build-essential cups libcups2 libcupsimage2 libcups2-dev libcupsimage2-dev libjbig-dev cups-ppdc recode checkinstall pkg-config ccache && \
            
            # Set dynamic paths and explicit linker flags
            export PKG_CONFIG_PATH=\"/usr/lib/${{ matrix.pkg_config_arch }}/pkgconfig:/usr/lib/pkgconfig:\$PKG_CONFIG_PATH\" && \
            export PATH=\"/usr/lib/ccache:\$PATH\" && \
            export LDFLAGS=\"-lcups -lcupsimage\" && \
            
            # Patch Makefile to use Debian's bundled JBIG library
            find . -type f -name '*.mk' -exec sed -i 's/-ljbig85/-ljbig/g' {} + && \
            
            make clean && \
            make && \
            make drv && \
            make ppd && \
            
            # Use DESTDIR to avoid absolute path creation errors
            mkdir -p /tmp/splix-install
            checkinstall -D --install=no --default \
              --pkgname='splix' \
              --pkgversion='2.0.2' \
              --maintainer='github-actions' \
              --pkgarch='${{ matrix.deb_arch }}' \
              --requires='cups, libcups2, libcupsimage2, libjbig0' \
              make DESTDIR=/tmp/splix-install install && \
              
            cp *.deb /workspace/artifacts/
          "

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splix-deb-${{ matrix.deb_arch }}
          path: artifacts/*.deb