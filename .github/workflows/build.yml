name: Build Splix .deb Packages (CMake)

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.deb_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # let both arches run even if one fails
      matrix:
        include:
          # ── AMD64 (native) ──────────────────────────────────────────────
          # The container runs natively on the x86-64 GitHub runner.
          - deb_arch: amd64
            toolchain_flag: ""

          # ── ARM64 (cross-compiled, NOT QEMU) ───────────────────────────
          # The container still runs on the x86-64 runner, but uses
          # aarch64-linux-gnu-g++ to produce ARM64 binaries directly.
          # This is 5-10× faster than QEMU emulation.
          - deb_arch: arm64
            toolchain_flag: "-DCMAKE_TOOLCHAIN_FILE=/workspace/cmake/toolchain-arm64.cmake"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ccache persists across workflow runs to speed up incremental builds.
      # The cache key includes the arch so amd64 and arm64 caches don't mix.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-cmake-${{ matrix.deb_arch }}-${{ github.sha }}
          restore-keys: |
            ccache-cmake-${{ matrix.deb_arch }}-

      # The entire build runs inside a Debian oldstable (Bullseye) container
      # so the output binary links against an old-enough glibc to run on most
      # Debian/Ubuntu systems in the field.
      #
      # Both amd64 and arm64 use --platform linux/amd64 here — we no longer
      # need QEMU because the arm64 binary is produced by the cross-compiler,
      # not by running an emulated arm64 process.
      - name: Build and package inside Debian oldstable
        run: |
          mkdir -p "${PWD}/artifacts" "${PWD}/.ccache"

          docker run --rm \
            --platform linux/amd64 \
            -v "${PWD}:/workspace" \
            -v "${PWD}/.ccache:/root/.ccache" \
            -w /workspace \
            -e CCACHE_DIR=/root/.ccache \
            -e DEB_ARCH="${{ matrix.deb_arch }}" \
            -e TOOLCHAIN_FLAG="${{ matrix.toolchain_flag }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            debian:oldstable \
            bash -c '
              set -euo pipefail

              # ── Base dependencies (same for amd64 and arm64) ──────────────
              apt-get update -y
              apt-get install -y --fix-missing \
                build-essential cmake \
                cups libcups2-dev libcupsimage2-dev libjbig-dev \
                pkg-config ccache checkinstall

              # ── ARM64 cross-compilation dependencies ───────────────────────
              # These are only installed for the arm64 matrix entry.
              # The cross-compiler produces ARM64 binaries on the native x86-64
              # runner — no QEMU emulation involved during compilation.
              if [ "${DEB_ARCH}" = "arm64" ]; then
                dpkg --add-architecture arm64
                apt-get update -y
                apt-get install -y --fix-missing \
                  gcc-aarch64-linux-gnu \
                  g++-aarch64-linux-gnu \
                  libcups2-dev:arm64 \
                  libcupsimage2-dev:arm64 \
                  libjbig-dev:arm64
              fi

              # Put ccache wrappers first so they intercept gcc/g++ calls.
              # For cross-compilation ccache transparently wraps the cross-compiler.
              export PATH="/usr/lib/ccache:${PATH}"

              # ── CMake configure + build ────────────────────────────────────
              rm -rf /tmp/splix-build
              mkdir  /tmp/splix-build

              # TOOLCHAIN_FLAG is empty for amd64, set for arm64.
              cmake \
                -S /workspace \
                -B /tmp/splix-build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                ${TOOLCHAIN_FLAG}

              cmake --build /tmp/splix-build --parallel "$(nproc)"

              # ── Package as .deb ────────────────────────────────────────────
              # Fallback to 2.0.2 if this is not a tagged release
              PKG_VERSION="${GITHUB_REF_NAME:-2.0.2}"
              if [ "${PKG_VERSION}" = "" ] || [ "${PKG_VERSION}" = "master" ] || [ "${PKG_VERSION}" = "main" ]; then
                PKG_VERSION="2.0.2"
              fi

              cd /tmp/splix-build

              mkdir -p /usr/lib/cups/filter \
                       /usr/share/cups/model/samsung \
                       /usr/share/cups/model/xerox \
                       /usr/share/cups/model/dell \
                       /usr/share/cups/model/lexmark \
                       /usr/share/cups/model/toshiba

              checkinstall \
                -D --install=no --default \
                --pkgname="splix" \
                --pkgversion="${PKG_VERSION}" \
                --maintainer="github-actions@noreply.github.com" \
                --pkgarch="${DEB_ARCH}" \
                --requires="cups, libcups2, libcupsimage2, libjbig0" \
                --nodoc \
                make install

              # Use find instead of glob — the glob expands before the .deb
              # is written, causing the original workflows to silently fail.
              find /tmp/splix-build -maxdepth 1 -name "*.deb" \
                   -exec cp -v {} /workspace/artifacts/ \;

              echo "── Packaged artifacts ──────────────────────────────"
              ls -lh /workspace/artifacts/
            '

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: splix-deb-${{ matrix.deb_arch }}
          path: artifacts/*.deb
          if-no-files-found: error

      # On version tags (e.g. v2.0.2) attach both .deb files to the GitHub
      # Release created for that tag.
      - name: Attach to GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb