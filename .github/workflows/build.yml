name: Build Splix .deb Packages (CMake)

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.deb_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # let both arches run even if one fails
      matrix:
        include:
          # ── AMD64 (native) ──────────────────────────────────────────────
          # The container runs natively on the x86-64 GitHub runner.
          - deb_arch: amd64
            cmake_preset: ci-amd64

          # ── ARM64 (cross-compiled, NOT QEMU) ───────────────────────────
          # The container still runs on the x86-64 runner, but uses
          # aarch64-linux-gnu-g++ to produce ARM64 binaries directly.
          # This is 5-10× faster than QEMU emulation.
          - deb_arch: arm64
            cmake_preset: ci-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ccache persists across workflow runs to speed up incremental builds.
      # The cache key includes the arch so amd64 and arm64 caches don't mix.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-cmake-${{ matrix.deb_arch }}-${{ github.sha }}
          restore-keys: |
            ccache-cmake-${{ matrix.deb_arch }}-

      # The entire build runs inside a Debian oldstable (Bullseye) container
      # so the output binary links against an old-enough glibc to run on most
      # Debian/Ubuntu systems in the field.
      #
      # Both amd64 and arm64 use --platform linux/amd64 here — we no longer
      # need QEMU because the arm64 binary is produced by the cross-compiler,
      # not by running an emulated arm64 process.
      - name: Build and package inside Debian oldstable
        run: |
          mkdir -p "${PWD}/artifacts" "${PWD}/.ccache"

          docker run --rm \
            --platform linux/amd64 \
            -v "${PWD}:/workspace" \
            -v "${PWD}/.ccache:/root/.ccache" \
            -w /workspace \
            -e CCACHE_DIR=/root/.ccache \
            -e DEB_ARCH="${{ matrix.deb_arch }}" \
            -e CMAKE_PRESET="${{ matrix.cmake_preset }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            debian:oldstable \
            bash -c '
              set -euo pipefail

              # ── Base dependencies (same for amd64 and arm64) ──────────────
              apt-get update -y
              apt-get install -y --fix-missing \
                build-essential cmake \
                cups libcups2-dev libcupsimage2-dev libjbig-dev \
                pkg-config ccache

              # ── ARM64 cross-compilation dependencies ───────────────────────
              # These are only installed for the arm64 matrix entry.
              # The cross-compiler produces ARM64 binaries on the native x86-64
              # runner — no QEMU emulation involved during compilation.
              if [ "${DEB_ARCH}" = "arm64" ]; then
                dpkg --add-architecture arm64
                apt-get update -y
                apt-get install -y --fix-missing \
                  gcc-aarch64-linux-gnu \
                  g++-aarch64-linux-gnu \
                  libcups2-dev:arm64 \
                  libcupsimage2-dev:arm64 \
                  libjbig-dev:arm64
              fi

              # Put ccache wrappers first so they intercept gcc/g++ calls.
              # For cross-compilation ccache transparently wraps the cross-compiler.
              export PATH="/usr/lib/ccache:${PATH}"

              # ── CMake configure + build ────────────────────────────────────
              rm -rf /tmp/splix-build

              cmake --preset "${CMAKE_PRESET}"
              cmake --build --preset "${CMAKE_PRESET}"

              # ── Package as .deb via CPack ──────────────────────────────────
              cd /tmp/splix-build
              cpack -G DEB

              # Copy the generated .deb to the artifacts directory
              cp -v /tmp/splix-build/*.deb /workspace/artifacts/

              echo "── Packaged artifacts ──────────────────────────────"
              ls -lh /workspace/artifacts/
            '

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: splix-deb-${{ matrix.deb_arch }}
          path: artifacts/*.deb
          if-no-files-found: error

      # On version tags (e.g. v2.0.2) attach both .deb files to the GitHub
      # Release created for that tag.
      - name: Attach to GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb