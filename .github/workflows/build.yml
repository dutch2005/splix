name: Build Splix .deb Packages (CMake)

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.deb_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # let both arches run even if one fails
      matrix:
        include:
          - platform: linux/amd64
            deb_arch: amd64
          - platform: linux/arm64
            deb_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ARM64 builds run under QEMU because GitHub runners are x86-only.
      # AMD64 builds skip this step – the container runs natively.
      - name: Set up QEMU (ARM64 only)
        if: matrix.deb_arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      # Persist ccache across runs to speed up subsequent builds.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-cmake-${{ matrix.deb_arch }}-${{ github.sha }}
          restore-keys: |
            ccache-cmake-${{ matrix.deb_arch }}-

      # Everything happens inside a Debian oldstable (Bullseye) container so
      # the resulting binary links against an old-enough glibc to run on most
      # Debian/Ubuntu systems in the field.
      - name: Build and package inside Debian oldstable
        run: |
          mkdir -p "${PWD}/artifacts" "${PWD}/.ccache"

          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${PWD}:/workspace" \
            -v "${PWD}/.ccache:/root/.ccache" \
            -w /workspace \
            -e CCACHE_DIR=/root/.ccache \
            debian:oldstable \
            bash -c '
              set -euo pipefail

              # ── Dependencies ──────────────────────────────────────────────
              apt-get update -y
              apt-get install -y \
                build-essential cmake \
                cups libcups2 libcupsimage2 \
                libcups2-dev libcupsimage2-dev \
                libjbig-dev \
                pkg-config \
                ccache \
                checkinstall

              # Put ccache wrappers first so they intercept gcc/g++ calls.
              export PATH="/usr/lib/ccache:${PATH}"

              # ── CMake configure + build ───────────────────────────────────
              # Build in an out-of-tree directory so source stays clean.
              rm -rf /tmp/splix-build
              mkdir  /tmp/splix-build

              cmake \
                -S /workspace \
                -B /tmp/splix-build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

              cmake --build /tmp/splix-build --parallel "$(nproc)"

              # ── Package as .deb ───────────────────────────────────────────
              # Generate a simple install script that checkinstall will wrap.
              # We install from the CMake build dir into DESTDIR so that
              # checkinstall can intercept the file list.  The package then
              # contains exactly what "cmake --install" would place on disk.
              mkdir -p /tmp/splix-install

              # Run cmake --install into a staging area first to generate the
              # file list; then hand the same install command to checkinstall.
              cd /tmp/splix-build

              checkinstall \
                -D --install=no --default \
                --pkgname="splix" \
                --pkgversion="${{ github.ref_name == '' && '2.0.2' || github.ref_name }}" \
                --maintainer="github-actions@noreply.github.com" \
                --pkgarch="${{ matrix.deb_arch }}" \
                --requires="cups, libcups2, libcupsimage2, libjbig0" \
                --nodoc \
                cmake --install . --prefix="" --destdir /tmp/splix-install

              # Use find instead of a glob so the shell does not expand *.deb
              # before the file actually exists (the bug in the original code).
              find /tmp/splix-build -maxdepth 1 -name "*.deb" \
                   -exec cp -v {} /workspace/artifacts/ \;

              echo "── Packaged artifacts ──────────────────────────────"
              ls -lh /workspace/artifacts/
            '

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: splix-deb-${{ matrix.deb_arch }}
          path: artifacts/*.deb
          if-no-files-found: error   # fail loudly if packaging produced nothing

      # On version tags (e.g. v2.0.2) attach both .deb files to the
      # GitHub Release that was created for that tag.
      - name: Attach to GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb