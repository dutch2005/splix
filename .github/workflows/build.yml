name: Build Splix Drivers

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.deb_arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # ARM64 (Raspberry Pi)
          - platform: linux/arm64
            deb_arch: arm64
          # x64 (Standard PC/Server)
          - platform: linux/amd64
            deb_arch: amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This official action teaches standard Docker how to understand ARM64
      - name: Set up QEMU for ARM emulation
        if: matrix.deb_arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      # Set up GitHub's free caching, uniquely keyed by architecture so ARM and x64 don't mix
      - name: Setup Compiler Cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.deb_arch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.deb_arch }}-

      # Use standard Docker commands with the N-1 'oldstable' strategy and injected caching!
      - name: Compile and Build natively via Debian Old-Stable
        run: |
          mkdir -p "${PWD}/artifacts"
          mkdir -p "${PWD}/.ccache"
          
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${PWD}:/workspace" \
            -v "${PWD}/.ccache:/root/.ccache" \
            -w /workspace \
            -e CCACHE_DIR=/root/.ccache \
            debian:oldstable bash -c "
            
            apt-get update -y && \
            apt-get install -y build-essential libcups2-dev libcupsimage2-dev libjbig-dev cups-ppdc recode checkinstall pkg-config ccache && \
            
            export PATH=\"/usr/lib/ccache:\$PATH\" && \
            
            find . -type f -name '*.mk' -exec sed -i 's/-ljbig85/-ljbig/g' {} + && \
            
            make clean && \
            make && \
            make drv && \
            make ppd && \
            
            checkinstall -D --install=no --default \
              --pkgname='splix' \
              --pkgversion='2.0.2' \
              --maintainer='github-actions' \
              --pkgarch='${{ matrix.deb_arch }}' \
              --requires='cups, libcups2, libcupsimage2, libjbig0' \
              make install && \
              
            cp *.deb /workspace/artifacts/
          "

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splix-deb-${{ matrix.deb_arch }}
          path: artifacts/*.deb